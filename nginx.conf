server {
    listen 80;
    server_name maheshbhau.xyz www.maheshbhau.xyz;

    # Certbot SSL challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Sab HTTP traffic HTTPS pe redirect
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name maheshbhau.xyz www.maheshbhau.xyz;

    ssl_certificate /etc/letsencrypt/live/maheshbhau.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maheshbhau.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Firebase Auth popup fix - COOP/COEP headers
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # React SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets cache
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
